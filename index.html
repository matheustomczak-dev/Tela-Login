<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
   

</head>
<body>
    <header>
        <nav>

        </nav>
    </header>

    <main>
        <div class="container">
            <h2 id="titulo">Tela de Login</h2>
            <form id="form-login">
                <div id="c-email" class="conjunto">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Email aqui" required>
                <div>
                        <div id="c-senha" class="conjunto">
                            <label for="senha">Senha:</label>
                            <input type="password id="senha" placeholder="Senha aqui" required>
                        </div>
                        <button id="botao_envio" type="submit">Entrar</button>
            </form>
            <div id="mensagem"></div>
            <div class="toggle" id="toggle">
                <p>Não tem conta? Cadastre-se! </p>
            </div>
        </div>
    </main>
    
    <footer>

    </footer>

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
